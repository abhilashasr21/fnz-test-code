name: "Terraform Init, Validate & Plan"
description: "Runs terraform fmt, init, validate, and plan against the repository root."

inputs:
  terraform-version:
    description: "Terraform version to install"
    required: false
    default: "latest"
  backend-config:
    description: "Optional value passed to 'terraform init -backend-config='"
    required: false
    default: ""
  var-file:
    description: "Optional .tfvars file passed to 'terraform plan -var-file='"
    required: false
    default: ""
  plan-out:
    description: "Output file for the generated plan"
    required: false
    default: "tfplan.binary"

outputs:
  plan-exitcode:
    description: "Exit code from 'terraform plan -detailed-exitcode' (0=no changes, 2=changes)"
    value: ${{ steps.plan.outputs.exitcode }}

runs:
  using: "composite"
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - name: Terraform Init
      shell: bash
      run: |
        if [ -n "${{ inputs.backend-config }}" ]; then
          terraform init -input=false -backend-config="${{ inputs.backend-config }}"
        else
          terraform init -input=false
        fi

    - name: Terraform Validate
      shell: bash
      run: terraform validate

    - name: OIDC Azure Login
      uses: azure/login@v2.3.0
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Terraform Plan
      id: plan
      shell: bash
      run: terraform plan

    # - name: Upload plan artifact
    #   uses: actions/upload-artifact@v4
    #   with:
    #     name: tfplan-${{ github.run_id }}
    #     path: ${{ inputs.plan-out }}
    #     retention-days: 5
name: Storage Account
on: 
  push:
    branches: ["main"]

  workflow_dispatch: 

permissions: 
  id-token: write
  contents: read

jobs:
  Bootstrap:
    name: Bootstrapping Code
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./Code_Vending/Scripts
        shell: pwsh
    steps:
      - name: AzureLogin
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check if Storage Account Exist
        run: ./TestStAccount.ps1

  

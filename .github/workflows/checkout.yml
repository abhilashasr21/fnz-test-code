name: Terraform Plan

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  id-token: write   # REQUIRED for OIDC
  contents: read   # REQUIRED to clone the repository

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: windows-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

    # Login to Azure with the OIDC token and set the subscription context
      - name: Login to Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Test login
        run: az account show

      # Runs a set of commands using the runners shell
    # Install the latest version of Terraform CLI and configure the Terraform CLI configuration file with a Terraform Cloud user API token
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

    # Initialize a new or existing Terraform working directory by creating initial files, loading any remote state, downloading modules, etc.
      - name: Terraform Init
        run: |
          cd '.\Code Vending\'
          terraform init

    # Adding terraform validate to check the syntax of the terraform files
      - name: Terraform Validate
        run: terraform validate
    # Adding terraform plan to check the syntax of the terraform files
      - name: Terraform Plan
        run: terraform Plan -out=tfplan

  powershell:
    name: Create Storage account
    runs-on: windows-latest
    needs: build
    environment: Prod

    steps:
      
      - uses: actions/checkout@v4

      # Run Powershell Script       
      - name: Run PowerShell Script
        shell: pwsh
        run: Write-Host "Hello from PowerShell"

      # Login to Azure with the OIDC token and set the subscription context
      - name: Login to Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Create the storage account
      - name: Create Storage Account
        shell: pwsh
        run: |
          $rg  = "rg-threadservice-tfstate"
          $loc = "eastus2"
          $st  = "stthreadtfstate"   # must be globally unique in Azure
          $ct  = "tfstate"

          az group create --name $rg --location $loc

          az storage account create `
            --name $st `
            --resource-group $rg `
            --location $loc `
            --sku Standard_LRS `
            --kind StorageV2 `
            --min-tls-version TLS1_2

          # Create container using Azure AD auth (OIDC login)
          az storage container create `
            --name $ct `
            --account-name $st `
            --auth-mode login


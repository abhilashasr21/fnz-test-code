name: Import Management Group
on:
    # push: 
    #     branches: [main]

    workflow_dispatch:
        inputs:
            ResourceBlockName:
                description: 'resource block name'
                required: true
                type: string

            ManagementGroupId:
                description: 'management group id'
                required: true
                type: string

permissions: 
    id-token: write   # required for OIDC
    contents: read
    pull-requests: write

env:
    tenant_id: ${{secrets.AZURE_TENANT_ID}}
    subscription_id: ${{secrets.AZURE_SUBSCRIPTION_ID}}
    client_id: ${{secrets.AZURE_CLIENT_ID}}

jobs:
    ImportManagementGroup:
        runs-on: ubuntu-latest
        env:
          resource_block_name: ${{github.event.inputs.ResourceBlockName}}
          management_group_id: ${{github.event.inputs.ManagementGroupId}}

        steps:
            - name: Checkout Code
              uses: actions/checkout@v5

            - name: Initializing Terraform
              uses: hashicorp/setup-terraform@v2

            - name: Azure Login (OIDC)
              uses: azure/login@v3
              with:
                client-id: ${{env.client_id}}
                subscription-id: ${{env.subscription_id}}
                tenant-id: ${{env.tenant_id}}

            - name: Terraform Setup
              uses: hashicorp/setup-terraform@v2
            - name: Terraform Init
              working-directory: azapi_mgmt_grp
              run: terraform init

            - name: Terraform Import Management Group
              working-directory: azapi_mgmt_grp
              run: terraform import azurerm_management_group.${{env.resource_block_name}} /providers/Microsoft.Management/managementGroups/${{env.management_group_id}}

            - name: Terraform Plan
              working-directory: azapi_mgmt_grp
              run: terraform plan

            - name: Terraform Apply
              working-directory: azapi_mgmt_grp
              run: terraform apply -auto-approve


name: Import Management Group
on:
  workflow_dispatch:
    inputs:
      ResourceBlockName:
        description: 'resource block name'
        required: false
        type: string
        default: 'management_group_child2'
      ImportAll:
        description: 'import all management groups visible to the service principal'
        required: false
        type: boolean
        default: true
      # ManagementGroupId:
      #   description: 'management group id'
      #   if: ${{ github.event.inputs.ImportAll == 'false' }}
      #   required: true
      #   type: string
      # ImportMap:
      #   description: 'JSON map of {"each_key":"management_group_id"} pairs. Example: {"mg1":"myMg1","mg2":"myMg2"}'
      #   if: ${{ github.event.inputs.ImportAll == 'false' }}
      #   required: true
      #   type: string

permissions: 
    id-token: write   # required for OIDC
    contents: read
    pull-requests: write

env:
    tenant_id: ${{secrets.AZURE_TENANT_ID}}
    subscription_id: ${{secrets.AZURE_SUBSCRIPTION_ID}}
    client_id: ${{secrets.AZURE_CLIENT_ID}}

jobs:
    ImportManagementGroup:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v5

            - name: Azure Login (OIDC)
              uses: azure/login@v3
              with:
                client-id: ${{env.client_id}}
                subscription-id: ${{env.subscription_id}}
                tenant-id: ${{env.tenant_id}}
            - name: Terraform Setup
              uses: hashicorp/setup-terraform@v2
            - name: Terraform Init
              working-directory: azapi_mgmt_grp
              run: terraform init

            - name: Discover & Import All Management Groups
              if: ${{ github.event.inputs.ImportAll == 'true' }}
              working-directory: azapi_mgmt_grp
              env:
                resource_name: ${{ github.event.inputs.ResourceBlockName }}
                api_version:   "2021-04-01"
                tenant_id:     ${{ secrets.AZURE_TENANT_ID }}
              run: |
                set -euo pipefail
                set -f

                echo "Listing management groups visible to the service principal..."
                mgs_json=$(az account management-group list --output json)
                echo "$mgs_json" | jq -r '.[] | "  - \(.name)\t\(.displayName)"'
                echo ""

                # Exclude the Tenant Root Group (its name == tenant id)
                mg_names=$(echo "$mgs_json" | jq -r --arg t "$tenant_id" '.[] | select(.name != $t) | .name')

                if [[ -z "$mg_names" ]]; then
                  echo "No management groups to import."
                  exit 0
                fi

                fail_count=0; skip_count=0; ok_count=0

                while read -r mg_id; do
                  [[ -z "$mg_id" ]] && continue
                  addr="azapi_resource.${resource_name}[\"${mg_id}\"]"
                  id="/providers/Microsoft.Management/managementGroups/${mg_id}?api-version=${api_version}"

                  echo "----------------------------------------------"
                  echo "Importing $addr"
                  echo "        <= $id"

                  if terraform state show "$addr" >/dev/null 2>&1; then
                    echo "  Already in state, skipping."
                    skip_count=$((skip_count+1))
                    continue
                  fi

                  if terraform import -- "$addr" "$id"; then
                    ok_count=$((ok_count+1))
                  else
                    echo "  ❌ Import failed for $mg_id"
                    fail_count=$((fail_count+1))
                  fi
                done <<< "$mg_names"

                echo "=============================================="
                echo "Imported: $ok_count  Skipped: $skip_count  Failed: $fail_count"
                [[ $fail_count -eq 0 ]]

            - name: Terraform Import
              if: ${{ github.event.inputs.ImportAll == 'false' }}
              working-directory: azapi_mgmt_grp
              env:
                resource_name: ${{ github.event.inputs.ResourceBlockName }}
                import_map:    ${{ github.event.inputs.ImportMap }}
                api_version:   "2021-04-01"
              run: |
                set -euo pipefail
                set -f

                echo "Importing azapi_resource.${resource_name}"

                echo "$import_map" | jq -r 'to_entries[] | "\(.key) \(.value)"' | \
                while read -r key mg_id; do
                  addr="azapi_resource.${resource_name}[\"${key}\"]"
                  id="/providers/Microsoft.Management/managementGroups/${mg_id}?api-version=${api_version}"
                  echo "----------------------------------------------"
                  echo "Importing $addr  <=  $id"
                  if terraform state show "$addr" >/dev/null 2>&1; then
                    echo "Already in state, skipping."
                  else
                    terraform import -- "$addr" "$id"
                  fi
                done
            - name: Terraform Plan
              working-directory: azapi_mgmt_grp
              run: terraform plan

            # - name: Terraform Apply
            #   working-directory: azapi_mgmt_grp
            #   run: terraform apply -auto-approve


name: Import Management Group
on:
  workflow_dispatch:
    inputs:
      ResourceBlockName:
        description: 'resource block name'
        required: true
        type: string
      # ManagementGroupId:
      #   description: 'management group id'
      #   required: true
      #   type: string
      ImportMap:
        description: 'JSON map of {"each_key":"management_group_id"} pairs. Example: {"mg1":"myMg1","mg2":"myMg2"}'
        required: true
        type: string

permissions: 
    id-token: write   # required for OIDC
    contents: read
    pull-requests: write

env:
    tenant_id: ${{secrets.AZURE_TENANT_ID}}
    subscription_id: ${{secrets.AZURE_SUBSCRIPTION_ID}}
    client_id: ${{secrets.AZURE_CLIENT_ID}}

jobs:
    ImportManagementGroup:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v5

            - name: Azure Login (OIDC)
              uses: azure/login@v3
              with:
                client-id: ${{env.client_id}}
                subscription-id: ${{env.subscription_id}}
                tenant-id: ${{env.tenant_id}}
            - name: Terraform Setup
              uses: hashicorp/setup-terraform@v2
            - name: Terraform Init
              working-directory: azapi_mgmt_grp
              run: terraform init

            - name: Terraform Import
              working-directory: azapi_mgmt_grp
              env:
                resource_name: ${{ github.event.inputs.ResourceBlockName }}
                import_map:    ${{ github.event.inputs.ImportMap }}
                api_version:   "2021-04-01"
              run: |
                set -euo pipefail
                set -f

                echo "Importing azapi_resource.${resource_name}"

                echo "$import_map" | jq -r 'to_entries[] | "\(.key) \(.value)"' | \
                while read -r key mg_id; do
                  addr="azapi_resource.${resource_name}[\"${key}\"]"
                  id="/providers/Microsoft.Management/managementGroups/${mg_id}?api-version=${api_version}"
                  echo "----------------------------------------------"
                  echo "Importing $addr  <=  $id"
                  if terraform state show "$addr" >/dev/null 2>&1; then
                    echo "Already in state, skipping."
                  else
                    terraform import -- "$addr" "$id"
                  fi
                done

            - name: Terraform Plan
              working-directory: azapi_mgmt_grp
              run: terraform plan

            - name: Terraform Apply
              working-directory: azapi_mgmt_grp
              run: terraform apply -auto-approve


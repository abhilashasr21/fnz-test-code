name: Terraform CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read
  pull-requests: write

jobs:
  lint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run TFLint
        uses: ./.github/actions/tflint

  terraform:
    name: Terraform Init / Validate / Plan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Terraform Plan
        id: tf
        uses: ./.github/actions/terraform-plan
        with:
          terraform-version: latest
          azure-client-id:        ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id:        ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id:  ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          backend-resource-group:  ${{ vars.TFSTATE_RESOURCE_GROUP }}
          backend-storage-account: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
          backend-container:       ${{ vars.TFSTATE_CONTAINER }}
          backend-key:             ${{ vars.TFSTATE_KEY }}     # e.g. prod.tfstate

      - name: Plan summary
        run: echo "Plan exit code = ${{ steps.tf.outputs.plan-exitcode }}"
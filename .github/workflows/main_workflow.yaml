name: Terraform CI
on:
  # push:
    # branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read
  pull-requests: write

jobs:
  lint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run TFLint
        uses: ./.github/actions/tflint

  approval-gate:
    name: Checking approval-gate
    needs: terraform
    env:
      tier: test
      tenant: test-tenant
    runs-on: ubuntu-latest
    steps:
      - name: Approval Confirmation
        run: |
          echo "## Deployment Approved" >> "$GITHUB_STEP_SUMMARY"
          echo "Tier: $TIER" >> "$GITHUB_STEP_SUMMARY"
          echo "Proceeding with deployment to $TENANT tenant" >> "$GITHUB_STEP_SUMMARY"

  terraform:
    name: Terraform Init / Validate / Plan
    runs-on: ubuntu-latest
    needs: approval-gate
    steps:
      - uses: actions/checkout@v4

      - name: Terraform Plan
        id: tf
        uses: ./.github/actions/terraform-plan
        with:
          terraform-version: latest
          azure-client-id:        ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id:        ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id:  ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          backend-resource-group:  "my-tfstate-rg"
          backend-storage-account: "mytfstateacct2026"
          backend-container:       "tfstate"
          backend-key:             "prod.terraform.tfstate"    # e.g. prod.tfstate

      - name: Plan summary
        run: echo "Plan exit code = ${{ steps.tf.outputs.plan-exitcode }}"
